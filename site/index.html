<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Reading Notes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #fafaf9;
  --surface: #ffffff;
  --border: #e7e5e4;
  --text: #1c1917;
  --text-secondary: #78716c;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --yellow: #ca8a04;
  --yellow-bg: #fefce8;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --gray: #a8a29e;
  --gray-bg: #f5f5f4;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  --code-block-bg: #1e293b;
  --code-block-fg: #e2e8f0;
}
:root.dark {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: #2a2a2a;
  --text: #e4e4e7;
  --text-secondary: #a1a1aa;
  --accent: #60a5fa;
  --accent-light: #1e293b;
  --green: #4ade80;
  --green-bg: #052e16;
  --yellow: #facc15;
  --yellow-bg: #1c1917;
  --red: #f87171;
  --red-bg: #1c0a0a;
  --gray: #52525b;
  --gray-bg: #1e1e1e;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
  --code-block-bg: #0d1117;
  --code-block-fg: #c9d1d9;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 2rem 1.5rem 1.5rem;
}
.header-inner {
  max-width: 960px;
  margin: 0 auto;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header p {
  color: var(--text-secondary);
  margin-top: 0.25rem;
  font-size: 0.9rem;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
}
.theme-toggle {
  flex-shrink: 0;
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  color: var(--text-secondary);
  padding: 0;
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.theme-toggle svg { width: 18px; height: 18px; }
.theme-toggle .icon-moon { display: block; }
.theme-toggle .icon-sun  { display: none; }
:root.dark .theme-toggle .icon-moon { display: none; }
:root.dark .theme-toggle .icon-sun  { display: block; }
.stats {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.stats .num {
  font-weight: 600;
  color: var(--text);
}

/* Controls */
.controls {
  max-width: 960px;
  margin: 1.5rem auto 0;
  padding: 0 1.5rem;
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 200px;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  background: var(--surface);
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--accent); }
.filter-btn {
  padding: 0.4rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-secondary);
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Paper list */
.paper-list {
  max-width: 960px;
  margin: 1.5rem auto 3rem;
  padding: 0 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.paper-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.paper-card:hover {
  box-shadow: var(--shadow-md);
  border-color: #d6d3d1;
}
:root.dark .paper-card:hover {
  border-color: #3f3f46;
}
.paper-card.expanded {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
}
.paper-top {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
}
.paper-badges {
  display: flex;
  gap: 0.35rem;
  flex-shrink: 0;
  flex-wrap: wrap;
  margin-top: 0.15rem;
}
.badge {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.badge-done { background: var(--green-bg); color: var(--green); }
.badge-pdf { background: var(--accent-light); color: var(--accent); }
.badge-pending { background: var(--yellow-bg); color: var(--yellow); }
.badge-missing { background: var(--gray-bg); color: var(--gray); }
.badge-venue {
  background: var(--gray-bg);
  color: var(--text-secondary);
  font-weight: 500;
}
.paper-info { flex: 1; min-width: 0; }
.paper-toggle {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  color: var(--text-secondary);
  font-size: 0.8rem;
  margin-top: 0.1rem;
}
.paper-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}
.paper-toggle svg {
  width: 14px;
  height: 14px;
  transition: transform 0.2s ease;
}
.paper-card.expanded .paper-toggle svg {
  transform: rotate(180deg);
}
.paper-toggle-hidden {
  visibility: hidden;
}
.paper-title {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 0.25rem;
}
.paper-meta {
  font-size: 0.82rem;
  color: var(--text-secondary);
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 1rem;
}
.paper-authors {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}
.paper-summary {
  margin-top: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* Links row */
.paper-links {
  display: flex;
  gap: 0.75rem;
  margin-top: 0.5rem;
  flex-wrap: wrap;
}
.paper-link {
  font-size: 0.78rem;
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  background: var(--gray-bg);
  color: var(--text-secondary);
  transition: background 0.15s;
}
.paper-link:hover { background: var(--border); text-decoration: none; }

/* Expanded notes */
.paper-notes {
  display: none;
  margin-top: 1rem;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
  padding-bottom: 3.5rem;
  position: relative;
}
.paper-card.expanded .paper-notes { display: block; }
.notes-collapse-bar {
  display: none;
  position: sticky;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0.5rem 0;
  text-align: right;
  background: linear-gradient(to top, var(--surface) 60%, transparent);
  pointer-events: none;
}
.paper-card.expanded .notes-collapse-bar { display: block; }
.notes-collapse-btn {
  pointer-events: auto;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text-secondary);
  box-shadow: var(--shadow-md);
  transition: all 0.15s;
}
.notes-collapse-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.notes-collapse-btn svg {
  width: 14px;
  height: 14px;
}
.notes-content {
  font-size: 0.9rem;
  line-height: 1.75;
}
.notes-content h1 { font-size: 1.3rem; margin: 1.5rem 0 0.75rem; }
.notes-content h2 {
  font-size: 1.1rem;
  margin: 1.5rem 0 0.5rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.notes-content h3 { font-size: 1rem; margin: 1.2rem 0 0.4rem; }
.notes-content p { margin: 0.5rem 0; }
.notes-content ul, .notes-content ol {
  margin: 0.5rem 0;
  padding-left: 1.5rem;
}
.notes-content li { margin: 0.25rem 0; }
.notes-content blockquote {
  border-left: 3px solid var(--accent);
  padding: 0.5rem 1rem;
  margin: 0.75rem 0;
  background: var(--accent-light);
  color: var(--text-secondary);
  font-size: 0.88rem;
}
.notes-content code {
  background: var(--gray-bg);
  padding: 0.15rem 0.35rem;
  border-radius: 3px;
  font-size: 0.85em;
}
.notes-content pre {
  background: var(--code-block-bg);
  color: var(--code-block-fg);
  padding: 1rem;
  border-radius: var(--radius);
  overflow-x: auto;
  margin: 0.75rem 0;
}
.notes-content pre code {
  background: none;
  padding: 0;
  color: inherit;
}
.notes-content table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.75rem 0;
  font-size: 0.85rem;
}
.notes-content th, .notes-content td {
  border: 1px solid var(--border);
  padding: 0.4rem 0.6rem;
  text-align: left;
}
.notes-content th { background: var(--gray-bg); font-weight: 600; }
.notes-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}
.notes-content strong { font-weight: 600; }

/* Toggle hint */
.expand-hint {
  display: none;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 3rem;
  color: var(--text-secondary);
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  font-size: 0.8rem;
  color: var(--gray);
  border-top: 1px solid var(--border);
}

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 1.5rem 1rem 1rem; }
  .controls { padding: 0 1rem; }
  .paper-list { padding: 0 1rem; }
  .paper-top { flex-direction: column; }
  .paper-badges { order: -1; }
  .stats { flex-wrap: wrap; gap: 0.75rem; }
}

/* KaTeX display math */
.notes-content .katex-display { margin: 0.75rem 0; overflow-x: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>Paper Reading Notes</h1>
        <p>3D Visual Grounding & Spatial Reasoning</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<div class="controls">
  <input class="search-box" id="search" type="text" placeholder="Search papers...">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="analyzed">Analyzed</button>
  <button class="filter-btn" data-filter="has-pdf">Has PDF</button>
  <button class="filter-btn" data-filter="pending">Pending</button>
</div>

<div class="paper-list" id="paper-list"></div>

<div class="footer">
  Built from <code>papers/</code> directory &middot; Generated by <code>scripts/build_site.py</code>
</div>

<script>
let allPapers = [];

async function loadPapers() {
  const resp = await fetch('papers.json');
  allPapers = await resp.json();
  renderStats();
  renderPapers(allPapers);
}

function renderStats() {
  const total = allPapers.length;
  const analyzed = allPapers.filter(p => p.has_notes).length;
  const hasPdf = allPapers.filter(p => p.has_pdf).length;
  const el = document.getElementById('stats');
  el.innerHTML = `
    <span><span class="num">${total}</span> papers</span>
    <span><span class="num">${analyzed}</span> analyzed</span>
    <span><span class="num">${hasPdf}</span> with PDF</span>
    <span><span class="num">${total - analyzed}</span> pending</span>
  `;
}

function getStatus(paper) {
  if (paper.has_notes) return 'analyzed';
  if (paper.has_pdf) return 'has-pdf';
  return 'pending';
}

function renderPapers(papers) {
  const list = document.getElementById('paper-list');
  if (!papers.length) {
    list.innerHTML = '<div class="empty">No papers match your search.</div>';
    return;
  }
  list.innerHTML = papers.map((p, i) => renderCard(p, i)).join('');
  // Re-render math in visible cards
  renderMath();
}

function renderCard(paper, idx) {
  const m = paper.metadata || {};
  const title = m.title || paper.slug;
  const authors = (m.authors || []).join(', ') || 'Unknown';
  const venue = m.venue || '';
  const year = m.year || '';
  const abstract = m.abstract || '';
  const status = getStatus(paper);

  // Badges
  let badges = '';
  if (status === 'analyzed') badges += '<span class="badge badge-done">Analyzed</span>';
  if (paper.has_pdf) badges += '<span class="badge badge-pdf">PDF</span>';
  if (status === 'pending') badges += '<span class="badge badge-pending">Pending</span>';
  if (status !== 'analyzed' && !paper.has_pdf) badges += '<span class="badge badge-missing">No PDF</span>';
  if (venue) badges += `<span class="badge badge-venue">${venue}</span>`;

  // Summary: use opensource summary or truncated abstract
  let summary = '';
  if (m.opensource && m.opensource.summary) {
    summary = m.opensource.summary;
  } else if (abstract && abstract !== 'unknown') {
    summary = abstract.length > 200 ? abstract.slice(0, 200) + '...' : abstract;
  }

  // Links
  let links = '';
  if (m.arxiv_url && m.arxiv_url !== 'unknown') {
    links += `<a class="paper-link" href="${m.arxiv_url}" target="_blank" onclick="event.stopPropagation()">arXiv</a>`;
  }
  if (m.pdf_url && m.pdf_url !== 'unknown') {
    links += `<a class="paper-link" href="${m.pdf_url}" target="_blank" onclick="event.stopPropagation()">PDF</a>`;
  }
  if (m.opensource) {
    (m.opensource.code || []).forEach(c => {
      links += `<a class="paper-link" href="${c.url}" target="_blank" onclick="event.stopPropagation()">Code</a>`;
    });
    (m.opensource.model || []).forEach(c => {
      links += `<a class="paper-link" href="${c.url}" target="_blank" onclick="event.stopPropagation()">Model</a>`;
    });
    (m.opensource.data || []).forEach(c => {
      links += `<a class="paper-link" href="${c.url}" target="_blank" onclick="event.stopPropagation()">Data</a>`;
    });
    if (m.opensource.project_page) {
      links += `<a class="paper-link" href="${m.opensource.project_page}" target="_blank" onclick="event.stopPropagation()">Project</a>`;
    }
  }

  // Notes
  let notesHtml = '';
  if (paper.notes) {
    const collapseSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
    notesHtml = `
      <div class="paper-notes">
        <div class="notes-content" id="notes-${idx}">${renderMarkdown(paper.notes)}</div>
        <div class="notes-collapse-bar">
          <button class="notes-collapse-btn" onclick="toggleCard(this)" title="Collapse notes">Collapse ${collapseSvg}</button>
        </div>
      </div>`;
  }

  const noteCount = paper.notes ? '' : '<span style="color:var(--gray);font-size:0.8rem;">No notes available</span>';

  const chevron = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  const toggleClass = paper.notes ? 'paper-toggle' : 'paper-toggle paper-toggle-hidden';

  return `
    <div class="paper-card" data-status="${status}" data-idx="${idx}">
      <div class="paper-top">
        <div class="paper-info">
          <div class="paper-title">${escHtml(title)}</div>
          <div class="paper-meta">
            <span class="paper-authors" title="${escHtml(authors)}">${escHtml(authors)}</span>
            ${year && year !== 'unknown' ? `<span>${year}</span>` : ''}
          </div>
        </div>
        <div class="paper-badges">${badges}</div>
        <button class="${toggleClass}" onclick="toggleCard(this)" title="Expand/collapse notes">${chevron}</button>
      </div>
      ${summary ? `<div class="paper-summary">${escHtml(summary)}</div>` : ''}
      ${links ? `<div class="paper-links">${links}</div>` : ''}
      ${notesHtml}
    </div>
  `;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMarkdown(md) {
  // Strip the first H1 title (already shown in card)
  let text = md.replace(/^#\s+.+\n+/, '');
  return marked.parse(text, { breaks: false, gfm: true });
}

function toggleCard(btn) {
  const card = btn.closest('.paper-card');
  card.classList.toggle('expanded');
  if (card.classList.contains('expanded')) {
    const notesEl = card.querySelector('.notes-content');
    if (notesEl && window.renderMathInElement) {
      renderMathInElement(notesEl, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
        ],
        throwOnError: false,
      });
    }
  }
}

function renderMath() {
  if (window.renderMathInElement) {
    // Only render in visible (expanded) cards
    document.querySelectorAll('.paper-card.expanded .notes-content').forEach(el => {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
        ],
        throwOnError: false,
      });
    });
  }
}

// Filter
let activeFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', () => {
  applyFilters();
});

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  let filtered = allPapers.filter(p => {
    // Filter by status
    const status = getStatus(p);
    if (activeFilter === 'analyzed' && status !== 'analyzed') return false;
    if (activeFilter === 'has-pdf' && !p.has_pdf) return false;
    if (activeFilter === 'pending' && status === 'analyzed') return false;

    // Search
    if (query) {
      const m = p.metadata || {};
      const haystack = [
        m.title, m.venue, (m.authors || []).join(' '),
        m.abstract, m.note,
        p.slug,
      ].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }

    return true;
  });
  renderPapers(filtered);
}

// Theme
const root = document.documentElement;
const saved = localStorage.getItem('theme');
if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  root.classList.add('dark');
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  root.classList.toggle('dark');
  localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
});

// KaTeX auto-render wait
function waitForKaTeX() {
  if (window.renderMathInElement) {
    loadPapers();
  } else {
    setTimeout(waitForKaTeX, 100);
  }
}
waitForKaTeX();
</script>
</body>
</html>
