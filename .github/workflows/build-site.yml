name: Build Site

on:
  push:
    branches: [main]
    paths: [papers/**]

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build papers.json
        run: python scripts/build_site.py

      - name: Commit updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/papers.json
          git diff --cached --quiet || git commit -m "chore: rebuild site/papers.json [skip ci]"
          git push
